{{- /* chezmoi:modify-template */ -}}
notify = ["{{ .chezmoi.homeDir }}/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]
model = "gpt-5.6-sol"
model_reasoning_effort = "medium"

# Codex manages marketplaces, node_repl, and TUI state per machine.

[plugins."visualize@openai-bundled"]
enabled = true

[plugins."sites@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[features]
hooks = true
js_repl = false

[mcp_servers.computer-use]
command = "./Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient"
args = ["mcp"]
cwd = "."
enabled = false

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[desktop]
conversationDetailMode = "STEPS_COMMANDS"
ambient-suggestions-enabled = false

[projects."{{ .chezmoi.sourceDir }}"]
trust_level = "trusted"

[hooks.state]

[hooks.state."{{ .chezmoi.homeDir }}/.codex/hooks.json:session_start:0:0"]
trusted_hash = "sha256:0717ed9d6c35270039cbb711af93688ffbcc76d352a7678db40a85213bd08ecc"

[tui.model_availability_nux]
{{- /* Codex updates this NUX counter itself; pass through the current value. */}}
{{- $nux := dict "gpt-5.6-sol" 1 }}
{{- if .chezmoi.stdin }}
{{-   with fromToml .chezmoi.stdin }}
{{-     with dig "tui" "model_availability_nux" "" . }}{{ $nux = . }}{{ end }}
{{-   end }}
{{- end }}
{{- range $k, $v := $nux }}
{{ printf "%q = %v" $k $v }}
{{- end }}
