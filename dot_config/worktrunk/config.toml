# Worktrunk user configuration
# https://worktrunk.dev/config/

[pre-switch]
# When switching to a branch that doesn't exist locally, fetch first so the
# remote-tracking ref is available and wt can create a tracking branch from it.
# Skipped for shortcuts (^ @ - pr: mr:) and branches that already exist locally;
# fetch failure (e.g. offline) doesn't block the switch.
fetch = "case '{{ branch | default('') }}' in ''|-|@|^|pr:*|mr:*) ;; *) git show-ref --verify --quiet 'refs/heads/{{ branch }}' || git fetch origin --prune || true ;; esac"

[pre-start]
# `wt switch --create <branch>` (e.g. via Claude Code's WorktreeCreate hook)
# branches from the base even when origin/<branch> already exists. wt still sets
# the upstream in that case, so fast-forward to it to open with remote content.
# Diverged or no upstream: keep the base content (|| true).
sync = "{% if upstream %}git merge --ff-only {{ upstream }} || true{% endif %}"

[post-start]
# Open newly created worktrees in Herdr with a shell + file viewer split in tab 1
# (ignore failure when the server is not running)
herdr = "bash ~/.config/herdr/scripts/worktree-open.sh {{ repo_path }} {{ worktree_path }} {{ branch }} || true"

[post-remove]
# Close the Herdr workspace attached to the removed worktree, deferred through
# pueue so the close runs in pueued's session — closing the workspace kills the
# pane's process group, which would otherwise take wt's own trash cleanup down
# with it (ignore failure when pueued or the herdr server is not running)
herdr = "pueue add --delay '5 seconds' -- bash ~/.config/herdr/scripts/worktree-close.sh {{ worktree_path }} || true"
