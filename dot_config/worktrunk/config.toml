# Worktrunk user configuration
# https://worktrunk.dev/config/

[pre-switch]
# When switching to a branch that doesn't exist locally, fetch first so the
# remote-tracking ref is available and wt can create a tracking branch from it.
# Skipped for shortcuts (^ @ - pr: mr:) and branches that already exist locally;
# fetch failure (e.g. offline) doesn't block the switch.
fetch = "case '{{ branch | default('') }}' in ''|-|@|^|pr:*|mr:*) ;; *) git show-ref --verify --quiet 'refs/heads/{{ branch }}' || git fetch origin --prune || true ;; esac"

[pre-start]
# `wt switch --create <branch>` (e.g. via Claude Code's WorktreeCreate hook or
# the herdr worktrunk plugin picker, which picks --create whenever the branch
# doesn't exist locally) branches from the base even when origin/<branch>
# already exists. If wt set the upstream, fast-forward to it; wt doesn't always
# do so, so otherwise adopt an existing origin/<branch> as upstream and
# fast-forward. Either way the worktree opens with the remote content.
# Diverged or no matching remote branch: keep the base content (|| true).
sync = "{% if upstream %}git merge --ff-only {{ upstream }} || true{% else %}{ git rev-parse --verify --quiet 'refs/remotes/origin/{{ branch }}' >/dev/null && git branch --set-upstream-to 'origin/{{ branch }}' && git merge --ff-only 'origin/{{ branch }}'; } || true{% endif %}"

[post-switch]
# Open the worktree in Herdr with the standard layout (shell + file viewer in
# tab 1, lazygit tab, hunk tab). post-switch rather than post-start so it also
# fires when switching to an already-existing worktree, e.g. via the herdr
# worktrunk plugin picker. The script itself skips workspaces that are already
# laid out. Skip the primary worktree; ignore failure when the server is not
# running.
herdr = "[ '{{ worktree_path }}' = '{{ primary_worktree_path }}' ] || bash ~/.config/herdr/scripts/worktree-open.sh {{ repo_path }} {{ worktree_path }} {{ branch }} || true"

[post-remove]
# Close the Herdr workspace attached to the removed worktree, deferred through
# pueue so the close runs in pueued's session — closing the workspace kills the
# pane's process group, which would otherwise take wt's own trash cleanup down
# with it (ignore failure when pueued or the herdr server is not running)
herdr = "pueue add --delay '5 seconds' -- bash ~/.config/herdr/scripts/worktree-close.sh {{ worktree_path }} || true"
